<svg viewBox="0 0 1500 1290" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c0521a"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6a3fa0"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a9a63"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1500" height="1290" fill="#fbfaf8"/>

  <!-- Title -->
  <text x="40" y="42" font-size="24" font-weight="700" fill="#1a1a1a">Clearpath Support Agent — RAG System Architecture</text>
  <text x="40" y="66" font-size="13" fill="#666">Prototype scope: single-tenant, file-backed vector store, synchronous query path</text>

  <!-- ================= LANE 1: OFFLINE INGESTION (y 90-270) ================= -->
  <rect x="30" y="90" width="1440" height="180" rx="10" fill="#eef4fb" stroke="#b9d3ec" stroke-width="1.5"/>
  <text x="50" y="115" font-size="15" font-weight="700" fill="#1e5aa8">1 · OFFLINE — Ingestion &amp; Indexing (build-time, re-run on KB change)</text>

  <g>
    <rect x="55" y="140" width="150" height="95" rx="6" fill="#ffffff" stroke="#7ba7d9" stroke-width="1.5"/>
    <text x="130" y="165" font-size="12" font-weight="700" text-anchor="middle">Knowledge Base</text>
    <text x="130" y="184" font-size="11" text-anchor="middle" fill="#444">faq.txt</text>
    <text x="130" y="200" font-size="11" text-anchor="middle" fill="#444">releases.txt</text>
    <text x="130" y="216" font-size="11" text-anchor="middle" fill="#444">runbook.txt</text>
  </g>

  <line x1="205" y1="187" x2="255" y2="187" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="260" y="140" width="170" height="95" rx="6" fill="#ffffff" stroke="#7ba7d9" stroke-width="1.5"/>
    <text x="345" y="165" font-size="12" font-weight="700" text-anchor="middle">Semantic Chunker</text>
    <text x="345" y="184" font-size="10.5" text-anchor="middle" fill="#444">1 Q&amp;A pair / 1 version</text>
    <text x="345" y="199" font-size="10.5" text-anchor="middle" fill="#444">block / 1 runbook issue</text>
    <text x="345" y="216" font-size="10.5" text-anchor="middle" fill="#777">(not char-count splits)</text>
  </g>

  <line x1="430" y1="187" x2="480" y2="187" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="485" y="140" width="195" height="95" rx="6" fill="#ffffff" stroke="#7ba7d9" stroke-width="1.5"/>
    <text x="582" y="163" font-size="12" font-weight="700" text-anchor="middle">Embedder</text>
    <text x="582" y="181" font-size="10.5" text-anchor="middle" fill="#444">Voyage voyage-3-lite (primary)</text>
    <text x="582" y="196" font-size="10.5" text-anchor="middle" fill="#444">TF-IDF (offline fallback)</text>
    <text x="582" y="214" font-size="10" text-anchor="middle" fill="#c0521a">content-hash disk cache</text>
  </g>

  <line x1="680" y1="187" x2="730" y2="187" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vector store cylinder -->
  <g>
    <path d="M 735 157 v 60 a 90 14 0 0 0 180 0 v -60" fill="#dfeee0" stroke="#5a9a63" stroke-width="1.5"/>
    <ellipse cx="825" cy="157" rx="90" ry="14" fill="#eaf6ea" stroke="#5a9a63" stroke-width="1.5"/>
    <text x="825" y="188" font-size="12" font-weight="700" text-anchor="middle">Vector Store</text>
    <text x="825" y="204" font-size="10.5" text-anchor="middle" fill="#444">chunks + embeddings</text>
    <text x="825" y="217" font-size="10" text-anchor="middle" fill="#444">(file-backed, single node)</text>
  </g>

  <text x="825" y="252" font-size="10.5" fill="#1e5aa8" text-anchor="middle" font-style="italic">PERSISTENT STATE lives here — the only durable store in the system</text>

  <!-- ================= LANE 2: RUNTIME QUERY PATH (y 290-800) ================= -->
  <rect x="30" y="290" width="1440" height="510" rx="10" fill="#eefaf0" stroke="#a9d9b4" stroke-width="1.5"/>
  <text x="50" y="315" font-size="15" font-weight="700" fill="#1f7a3d">2 · RUNTIME — Query Path (synchronous, per support-agent request; stateless across turns)</text>

  <g>
    <rect x="55" y="345" width="150" height="70" rx="6" fill="#ffffff" stroke="#6bb37c" stroke-width="1.5"/>
    <text x="130" y="375" font-size="12" font-weight="700" text-anchor="middle">Agent / Demo UI</text>
    <text x="130" y="392" font-size="10.5" text-anchor="middle" fill="#444">submits question</text>
  </g>

  <line x1="130" y1="415" x2="130" y2="450" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="55" y="455" width="150" height="70" rx="6" fill="#ffffff" stroke="#6bb37c" stroke-width="1.5"/>
    <text x="130" y="480" font-size="11.5" font-weight="700" text-anchor="middle">Embedder</text>
    <text x="130" y="496" font-size="10" text-anchor="middle" fill="#444">(query, cache-checked)</text>
    <text x="130" y="510" font-size="10" text-anchor="middle" fill="#444">same module as ingest</text>
  </g>

  <line x1="205" y1="490" x2="255" y2="490" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="260" y="455" width="170" height="70" rx="6" fill="#ffffff" stroke="#6bb37c" stroke-width="1.5"/>
    <text x="345" y="480" font-size="12" font-weight="700" text-anchor="middle">Retriever</text>
    <text x="345" y="497" font-size="10.5" text-anchor="middle" fill="#444">cosine similarity</text>
    <text x="345" y="511" font-size="10.5" text-anchor="middle" fill="#444">top-K = 3 chunks</text>
  </g>

  <!-- retriever reads from vector store -->
  <path d="M 400 455 C 500 400, 650 300, 780 240" fill="none" stroke="#5a9a63" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <text x="560" y="360" font-size="10" fill="#5a9a63" text-anchor="middle">read (top-K lookup against index)</text>

  <line x1="430" y1="490" x2="480" y2="490" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Threshold gate (diamond) -->
  <polygon points="580,450 680,490 580,530 480,490" fill="#fff3e0" stroke="#c0521a" stroke-width="1.5"/>
  <text x="580" y="484" font-size="10.5" text-anchor="middle" font-weight="700">score ≥</text>
  <text x="580" y="498" font-size="10.5" text-anchor="middle" font-weight="700">threshold?</text>
  <text x="580" y="548" font-size="9.5" text-anchor="middle" fill="#777">TF-IDF: 0.12 · Voyage: 0.20</text>

  <!-- gate NO -> fallback -->
  <line x1="580" y1="530" x2="580" y2="610" stroke="#c0521a" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="596" y="575" font-size="10" fill="#c0521a">no (below gate) —</text>
  <text x="596" y="589" font-size="10" fill="#c0521a">skips LLM call entirely</text>

  <!-- gate YES -> generator -->
  <line x1="680" y1="490" x2="730" y2="490" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="695" y="478" font-size="10" fill="#1f7a3d">yes</text>

  <g>
    <rect x="735" y="455" width="190" height="70" rx="6" fill="#ffffff" stroke="#6bb37c" stroke-width="1.5"/>
    <text x="830" y="478" font-size="12" font-weight="700" text-anchor="middle">Generator</text>
    <text x="830" y="495" font-size="10.5" text-anchor="middle" fill="#444">claude-haiku-4-5</text>
    <text x="830" y="510" font-size="10.5" text-anchor="middle" fill="#444">emits answer + "confident" flag</text>
  </g>

  <line x1="925" y1="490" x2="975" y2="490" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- self-assessment diamond -->
  <polygon points="1075,450 1175,490 1075,530 975,490" fill="#fff3e0" stroke="#c0521a" stroke-width="1.5"/>
  <text x="1075" y="484" font-size="10.5" text-anchor="middle" font-weight="700">model self-</text>
  <text x="1075" y="498" font-size="10.5" text-anchor="middle" font-weight="700">reports confident?</text>

  <line x1="1075" y1="530" x2="1075" y2="610" stroke="#c0521a" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="1090" y="575" font-size="10" fill="#c0521a">no — caught what</text>
  <text x="1090" y="589" font-size="10" fill="#c0521a">retrieval missed</text>

  <line x1="1175" y1="490" x2="1240" y2="490" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1195" y="478" font-size="10" fill="#1f7a3d">yes</text>

  <g>
    <rect x="1245" y="455" width="190" height="70" rx="6" fill="#ffffff" stroke="#6bb37c" stroke-width="1.5"/>
    <text x="1340" y="478" font-size="12" font-weight="700" text-anchor="middle">Grounded Answer</text>
    <text x="1340" y="495" font-size="10.5" text-anchor="middle" fill="#444">+ retrieval trace</text>
  </g>

  <!-- Fallback box -->
  <g>
    <rect x="430" y="610" width="800" height="70" rx="6" fill="#fff3e0" stroke="#c0521a" stroke-width="1.5"/>
    <text x="830" y="636" font-size="12" font-weight="700" text-anchor="middle" fill="#c0521a">Fallback Response</text>
    <text x="830" y="654" font-size="10.5" text-anchor="middle" fill="#5a3410">"I don't have a confident answer in the knowledge base — escalate to a human agent"</text>
    <text x="830" y="669" font-size="9.5" text-anchor="middle" fill="#8a5a2a">two-stage gate: cosine threshold (cheap, pre-LLM) + model self-assessment (post-LLM) — cost-efficient out-of-scope handling</text>
  </g>

  <!-- grounded answer down to shared response box -->
  <line x1="1340" y1="525" x2="1340" y2="700" stroke="#333" stroke-width="1.5"/>
  <line x1="1340" y1="700" x2="1000" y2="700" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- fallback down to shared response box -->
  <line x1="830" y1="680" x2="830" y2="700" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="680" y="705" width="300" height="60" rx="6" fill="#ffffff" stroke="#6bb37c" stroke-width="1.5"/>
    <text x="830" y="730" font-size="12" font-weight="700" text-anchor="middle">Response to Agent UI</text>
    <text x="830" y="748" font-size="10" text-anchor="middle" fill="#444">answer (grounded or fallback) + sources shown</text>
  </g>

  <text x="1400" y="750" font-size="10" fill="#1f7a3d" text-anchor="end" font-style="italic">STATELESS per request — no session</text>
  <text x="1400" y="764" font-size="10" fill="#1f7a3d" text-anchor="end" font-style="italic">memory held between turns</text>

  <!-- ================= LANE 3: EVALUATION (y 820-970) ================= -->
  <rect x="30" y="820" width="1440" height="150" rx="10" fill="#f4eefb" stroke="#c9aee6" stroke-width="1.5"/>
  <text x="50" y="845" font-size="15" font-weight="700" fill="#6a3fa0">3 · OFFLINE / ASYNC — Evaluation Loop (run on demand, not in the request path)</text>

  <g>
    <rect x="55" y="875" width="180" height="70" rx="6" fill="#ffffff" stroke="#a67bd4" stroke-width="1.5"/>
    <text x="145" y="902" font-size="12" font-weight="700" text-anchor="middle">Test Set</text>
    <text x="145" y="919" font-size="10.5" text-anchor="middle" fill="#444">in-scope, cross-doc,</text>
    <text x="145" y="933" font-size="10.5" text-anchor="middle" fill="#444">version-nuanced, OOS</text>
  </g>

  <line x1="235" y1="910" x2="285" y2="910" stroke="#333" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <g>
    <rect x="290" y="875" width="220" height="70" rx="6" fill="#ffffff" stroke="#a67bd4" stroke-width="1.5"/>
    <text x="400" y="902" font-size="12" font-weight="700" text-anchor="middle">LLM-as-Judge</text>
    <text x="400" y="919" font-size="10.5" text-anchor="middle" fill="#444">claude-sonnet-4-6</text>
    <text x="400" y="933" font-size="10.5" text-anchor="middle" fill="#444">(higher-capability, judge-only)</text>
  </g>

  <line x1="510" y1="910" x2="560" y2="910" stroke="#333" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <g>
    <rect x="565" y="875" width="220" height="70" rx="6" fill="#ffffff" stroke="#a67bd4" stroke-width="1.5"/>
    <text x="675" y="902" font-size="12" font-weight="700" text-anchor="middle">Eval Report</text>
    <text x="675" y="919" font-size="10.5" text-anchor="middle" fill="#444">pass/fail per case,</text>
    <text x="675" y="933" font-size="10.5" text-anchor="middle" fill="#444">fallback correctness</text>
  </g>

  <line x1="785" y1="910" x2="835" y2="910" stroke="#333" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <g>
    <rect x="840" y="875" width="260" height="70" rx="6" fill="#ffffff" stroke="#a67bd4" stroke-width="1.5"/>
    <text x="970" y="898" font-size="12" font-weight="700" text-anchor="middle">Feeds back into:</text>
    <text x="970" y="915" font-size="10.5" text-anchor="middle" fill="#444">threshold calibration,</text>
    <text x="970" y="930" font-size="10.5" text-anchor="middle" fill="#444">prompt tuning, chunking rules</text>
  </g>

  <!-- dashed feedback loop back to threshold gate -->
  <path d="M 970 875 C 970 750, 650 620, 610 530" fill="none" stroke="#a67bd4" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <text x="1010" y="800" font-size="10" fill="#6a3fa0" text-anchor="middle" font-style="italic">feedback loop (manual, between sprints)</text>

  <!-- ================= LANE 4: OPERATIONAL NOTES (y 990-1245) ================= -->
  <rect x="30" y="990" width="1440" height="255" rx="10" fill="#fbfaf8" stroke="#cfcac2" stroke-width="1.5"/>
  <text x="50" y="1015" font-size="15" font-weight="700" fill="#333">4 · SCALE &amp; FAILURE NOTES (prototype constraints — see written rationale for production changes)</text>

  <g>
    <rect x="55" y="1035" width="440" height="190" rx="6" fill="#ffffff" stroke="#cfcac2" stroke-width="1.3"/>
    <text x="70" y="1060" font-size="12" font-weight="700" fill="#c0521a">Concurrency spike (many agents at once)</text>
    <text x="70" y="1083" font-size="10.5" fill="#333">• Embedding cache absorbs repeated/similar</text>
    <text x="82" y="1097" font-size="10.5" fill="#333">  queries without re-calling the embed API</text>
    <text x="70" y="1115" font-size="10.5" fill="#333">• Cosine gate skips the LLM call for out-of-</text>
    <text x="82" y="1129" font-size="10.5" fill="#333">  scope queries, reducing peak LLM load</text>
    <text x="70" y="1147" font-size="10.5" fill="#333">• Generator calls are synchronous per request —</text>
    <text x="82" y="1161" font-size="10.5" fill="#333">  no queue/batching in the prototype, so p95</text>
    <text x="82" y="1175" font-size="10.5" fill="#333">  latency rises with concurrent load</text>
    <text x="70" y="1197" font-size="10.5" fill="#333">• No horizontal scaling: single process serves</text>
    <text x="82" y="1211" font-size="10.5" fill="#333">  all requests</text>
  </g>

  <g>
    <rect x="520" y="1035" width="440" height="190" rx="6" fill="#ffffff" stroke="#cfcac2" stroke-width="1.3"/>
    <text x="535" y="1060" font-size="12" font-weight="700" fill="#c0521a">What breaks first</text>
    <text x="535" y="1083" font-size="10.5" fill="#333">1. Vector store — file-backed, single-writer,</text>
    <text x="547" y="1097" font-size="10.5" fill="#333">   no replication. Concurrent re-index while</text>
    <text x="547" y="1111" font-size="10.5" fill="#333">   serving queries risks read/write contention.</text>
    <text x="535" y="1133" font-size="10.5" fill="#333">2. Generator LLM API — rate limits hit under</text>
    <text x="547" y="1147" font-size="10.5" fill="#333">   burst load; no retry/backoff queue yet.</text>
    <text x="535" y="1169" font-size="10.5" fill="#333">3. Single process/host — no failover; a crash</text>
    <text x="547" y="1183" font-size="10.5" fill="#333">   takes down ingestion, query, and eval alike</text>
    <text x="547" y="1197" font-size="10.5" fill="#333">   since they currently share one deployable.</text>
  </g>

  <g>
    <rect x="985" y="1035" width="450" height="190" rx="6" fill="#ffffff" stroke="#cfcac2" stroke-width="1.3"/>
    <text x="1000" y="1060" font-size="12" font-weight="700" fill="#1e5aa8">Where state lives</text>
    <text x="1000" y="1083" font-size="10.5" fill="#333">• Durable: vector index + embedding disk</text>
    <text x="1012" y="1097" font-size="10.5" fill="#333">  cache (content-hash keyed), rebuilt from KB</text>
    <text x="1012" y="1111" font-size="10.5" fill="#333">  text files, which are themselves the source</text>
    <text x="1012" y="1125" font-size="10.5" fill="#333">  of truth</text>
    <text x="1000" y="1147" font-size="10.5" fill="#333">• Ephemeral: nothing — each query is stateless,</text>
    <text x="1012" y="1161" font-size="10.5" fill="#333">  no conversation memory held server-side</text>
    <text x="1000" y="1183" font-size="10.5" fill="#333">• This statelessness is what makes horizontal</text>
    <text x="1012" y="1197" font-size="10.5" fill="#333">  scaling of the query path tractable later</text>
  </g>

  <text x="750" y="1270" font-size="10" fill="#999" text-anchor="middle">Clearpath Support Systems · Task 2 of 3 · Engineering Review Draft</text>
</svg>
